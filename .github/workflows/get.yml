name: Extract Unity DLL from Link

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Unity .pkg 下载链接'
        required: true
        default: 'https://download.unity3d.com/download_unity/dd0c98481d00/MacEditorTargetInstaller/UnitySetup-Windows-Mono-Support-for-Editor-2022.3.56f1.pkg'

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install p7zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full p7zip-rar

      - name: Download Unity Package
        run: |
          curl -L "${{ github.event.inputs.download_url }}" -o unity_setup.pkg

      - name: Extract PKG using 7z
        run: |
          # 第一步：解开 pkg 外壳（它本质上是一个 XAR 归档，7z 支持它）
          mkdir -p pkg_unpacked
          7z x unity_setup.pkg -opkg_unpacked
          
          # 第二步：进入解压出的目录，寻找所有的 Payload 文件
          # Unity 的数据通常就在这些没有后缀名为 Payload 的文件中
          mkdir -p final_content
          find pkg_unpacked -name "Payload" | while read payload; do
            echo "Processing $payload..."
            # Payload 往往是 cpio 压缩包，7z 同样可以直接处理
            7z x "$payload" -ofinal_content -y || true
          done

      - name: Find and Collect DLLs
        run: |
          mkdir -p output
          
          # 寻找开发版 (Debug/Development) 的 UnityPlayer.dll
          # 路径通常包含 win64_development_mono
          find final_content -path "*/win64_development_mono/*UnityPlayer.dll" -exec cp {} ./output/development_UnityPlayer.dll \;
          
          # 寻找发行版 (Release) 作为备份
          find final_content -path "*/win64_release_mono/*UnityPlayer.dll" -exec cp {} ./output/release_UnityPlayer.dll \;

          # 如果上面两个特定路径都没搜到，搜全局并重命名
          if [ ! -f ./output/development_UnityPlayer.dll ]; then
            find final_content -name "UnityPlayer.dll" | while read dll; do
              # 获取父目录名以作区分
              pdir=$(basename $(dirname $dll))
              cp "$dll" "./output/${pdir}_UnityPlayer.dll"
            done
          fi

          echo "Final files in output:"
          ls -R ./output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity-DLL-Result
          path: output/
