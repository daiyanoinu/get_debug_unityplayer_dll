name: Extract Unity DLL (Deep Scan)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Unity .pkg 下载链接'
        required: true
        default: 'https://download.unity3d.com/download_unity/dd0c98481d00/MacEditorTargetInstaller/UnitySetup-Windows-Mono-Support-for-Editor-2022.3.56f1.pkg'

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full cpio

      - name: Download
        run: curl -L "${{ github.event.inputs.download_url }}" -o unity_setup.pkg

      - name: Unpack Strategy
        run: |
          mkdir -p raw_unpacked
          # 1. 解开 XAR 外壳
          7z x unity_setup.pkg -oraw_unpacked
          
          mkdir -p deep_content
          # 2. 深度搜索所有 Payload 文件并强制解压
          find raw_unpacked -name "Payload" | while read payload; do
            echo "Processing Payload: $payload"
            # 尝试多种解压方式：直接 cpio 或 先 gunzip 再 cpio
            (cd deep_content && cat "../$payload" | (gunzip -c 2>/dev/null || cat) | cpio -idm 2>/dev/null || true)
          done

      - name: Collect Results
        run: |
          mkdir -p output
          
          # 打印一下找到的文件结构，方便调试
          echo "Scanning for UnityPlayer.dll..."
          find deep_content -name "UnityPlayer.dll"
          
          # 搜索所有位置并拷贝
          # 我们重点找包含 'win64' 且包含 'development' 的路径
          find deep_content -name "UnityPlayer.dll" | while read dll; do
            full_path="$dll"
            # 根据路径特征命名
            if [[ "$full_path" == *"development"* ]]; then
               cp "$full_path" "./output/Debug_UnityPlayer.dll"
               echo "Found Debug DLL: $full_path"
            elif [[ "$full_path" == *"release"* ]]; then
               cp "$full_path" "./output/Release_UnityPlayer.dll"
               echo "Found Release DLL: $full_path"
            else
               # 兜底命名：用倒数第二级目录名
               suffix=$(basename $(dirname "$full_path"))
               cp "$full_path" "./output/${suffix}_UnityPlayer.dll"
            fi
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Unity-DLL-Result
          path: output/
